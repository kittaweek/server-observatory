name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-scan:
    name: Lint & Security Scan
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: |
          pip install pre-commit detect-secrets
          pre-commit run --all-files

  validate-stack:
    name: Validate Monitoring Stack
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Generate test .env
        # CI only needs the vars that are actively referenced by the
        # rendered configs. Alertmanager/Prometheus entrypoints provide
        # soft defaults for everything else at runtime.
        run: |
          cp .env.example .env
          # Ensure required Grafana vars are present for `compose config`.
          grep -q '^GF_ADMIN_USER='     .env || echo 'GF_ADMIN_USER=admin'           >> .env
          grep -q '^GF_ADMIN_PASSWORD=' .env || echo 'GF_ADMIN_PASSWORD=ci-dummy'    >> .env

      - name: Validate docker-compose config
        run: docker compose config --quiet

      - name: Validate Prometheus config
        run: |
          set -a; . ./.env; set +a
          mkdir -p /tmp/rules
          envsubst < prometheus/prometheus.yml > /tmp/prometheus.yml
          envsubst < prometheus/rules/alert.rules.yml > /tmp/rules/alert.rules.yml
          docker run --rm \
            --entrypoint promtool \
            -v /tmp/prometheus.yml:/etc/prometheus/prometheus.yml \
            -v /tmp/rules:/tmp/rules \
            prom/prometheus:v3.11.1 check config /etc/prometheus/prometheus.yml

      - name: Validate Alertmanager config
        run: |
          set -a; . ./.env; set +a
          # Soft defaults mirror alertmanager/entrypoint.sh so that
          # commented-out channels don't leave unresolved ${VAR} refs.
          : "${MSTEAMS_WEBHOOK_URL:=http://localhost/dummy}"
          : "${LINE_WEBHOOK_URL:=http://localhost/dummy}"
          export MSTEAMS_WEBHOOK_URL LINE_WEBHOOK_URL
          envsubst < alertmanager/alertmanager.yml > /tmp/alertmanager.yml
          docker run --rm \
            --entrypoint amtool \
            -v /tmp/alertmanager.yml:/etc/alertmanager/alertmanager.yml \
            prom/alertmanager:v0.32.0 check-config /etc/alertmanager/alertmanager.yml
