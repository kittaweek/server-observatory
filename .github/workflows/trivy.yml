name: Trivy vulnerability scan

on:
  push:
    branches: [master, dev]
  schedule:
    - cron: "0 3 * * 1" # every Monday at 3am UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-upstream:
    name: Scan upstream images
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        image:
          - prom/prometheus:v3.11.1
          - prom/node-exporter:v1.11.1

    steps:
      - name: Run Trivy on ${{ matrix.image }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.image }}
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  scan-patched:
    name: Build and scan patched images
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: grafana-patched
            dockerfile: Dockerfile.grafana
          - name: alertmanager-patched
            dockerfile: Dockerfile.alertmanager

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          tags: ${{ matrix.name }}:ci
          load: true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      - name: Run Trivy on ${{ matrix.name }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.name }}:ci
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
