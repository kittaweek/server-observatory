name: Trivy vulnerability scan

on:
  push:
    branches: [master, dev]
  schedule:
    - cron: "0 3 * * 1" # every Monday at 3am UTC

jobs:
  scan-upstream:
    name: Scan upstream images
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        image:
          - prom/prometheus:v3.11.1
          - prom/node-exporter:v1.11.1

    steps:
      - name: Run Trivy on ${{ matrix.image }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.image }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  scan-patched:
    name: Build and scan patched images
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: grafana-patched
            dockerfile: Dockerfile.grafana
          - name: alertmanager-patched
            dockerfile: Dockerfile.alertmanager

    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.name }}
        run: docker build -t ${{ matrix.name }}:ci -f ${{ matrix.dockerfile }} .

      - name: Run Trivy on ${{ matrix.name }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.name }}:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
