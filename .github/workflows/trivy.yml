name: Trivy vulnerability scan

on:
  push:
    branches: [master, dev]
  # pull_request:
  #   branches: [master]
  schedule:
    - cron: "0 3 * * 1" # every Monday at 3am

jobs:
  scan:
    name: Scan Docker images
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        image:
          - prom/prometheus:v3.11.1
          - grafana/grafana:local
          - prom/alertmanager:v0.32.0
          - prom/node-exporter:v1.11.1
    steps:
      - name: Build Grafana
        if: matrix.image == 'grafana/grafana:local'
        run: docker build -t grafana/grafana:local -f Dockerfile.grafana .

      - name: Run Trivy on ${{ matrix.image }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.image }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          # For local images, trivy needs access to the docker daemon
          # This should work as long as it's been built in the same runner
