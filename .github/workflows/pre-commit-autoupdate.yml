name: Update pre-commit hooks

on:
  schedule:
    - cron: '0 0 * * 1'  # every Monday at midnight
  workflow_dispatch:

jobs:
  autoupdate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit autoupdate
        run: pre-commit autoupdate

      - name: Create PR if hooks were updated
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: update pre-commit hook versions'
          title: 'chore: update pre-commit hook versions'
          body: 'Automated weekly update of pre-commit hook versions via `pre-commit autoupdate`.'
          branch: chore/pre-commit-autoupdate
          labels: dependencies
