global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'msteams'
  routes:
  - match:
      severity: critical
    receiver: 'msteams-and-telegram'
  - match:
      severity: warning
    receiver: 'telegram'

receivers:
- name: 'msteams'
  webhook_configs:
  - url: '${MSTEAMS_WEBHOOK_URL}'

- name: 'telegram'
  telegram_configs:
  - bot_token: '${TELEGRAM_BOT_TOKEN}'
    chat_id: ${TELEGRAM_CHAT_ID}
    parse_mode: 'HTML'

- name: 'msteams-and-telegram'
  webhook_configs:
  - url: '${MSTEAMS_WEBHOOK_URL}'
  telegram_configs:
  - bot_token: '${TELEGRAM_BOT_TOKEN}'
    chat_id: ${TELEGRAM_CHAT_ID}
    parse_mode: 'HTML'

- name: 'slack'
  slack_configs:
  - api_url: '${SLACK_WEBHOOK_URL}'
    channel: '${SLACK_CHANNEL}'

- name: 'email'
  email_configs:
  - to: '${ALERT_EMAIL_TO}'
    from: '${SMTP_FROM}'
    smarthost: '${SMTP_HOST}'
    auth_username: '${SMTP_USER}'
    auth_password: '${SMTP_PASSWORD}'

- name: 'line'
  webhook_configs:
  - url: '${LINE_WEBHOOK_URL}'
