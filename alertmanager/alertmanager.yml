global:
  resolve_timeout: 5m

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'telegram'

  routes:
    - match:
        severity: critical
      receiver: 'telegram'
      repeat_interval: 1h

receivers:
  # 🟠 Telegram (default)
  - name: 'telegram'
    telegram_configs:
      - bot_token: '${TELEGRAM_BOT_TOKEN}'
        chat_id: ${TELEGRAM_CHAT_ID}
        parse_mode: 'HTML'
        message: '{{ template "telegram.message" . }}'

  # 🟢 Microsoft Teams (optional)
  # - name: 'msteams'
  #   webhook_configs:
  #     - url: '${MSTEAMS_WEBHOOK_URL}'

  # 🔵 Slack (optional)
  # - name: 'slack'
  #   slack_configs:
  #     - api_url: '${SLACK_WEBHOOK_URL}'
  #       channel: '${SLACK_CHANNEL}'

  # ⚪ Email (optional)
  # - name: 'email'
  #   email_configs:
  #     - to: '${ALERT_EMAIL_TO}'
  #       from: '${SMTP_FROM}'
  #       smarthost: '${SMTP_HOST}'
