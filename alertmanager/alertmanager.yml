global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  # --- Default Receiver ---
  # By default, use msteams as an example, but you can change it to slack, telegram, etc.
  receiver: 'msteams'

  routes:
    # Example: route specific severities to different receivers
    - match:
        severity: critical
      receiver: 'msteams' # Change to yours if needed

receivers:
  # 🟢 Microsoft Teams
  - name: 'msteams'
    webhook_configs:
      - url: '${MSTEAMS_WEBHOOK_URL}'

  # 🟠 Telegram (Template - Uncomment to enable)
