networks:
  observatory-net-test:
    driver: bridge
  devsiam-mon:
    name: devsiam-mon
    driver: bridge
services:
  prometheus:
    user: "65534:0"
    build:
      context: .
      dockerfile: Dockerfile.prometheus
    image: prom/prometheus:${STACK_TAG:-local}
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - ./data/prometheus:/prometheus
    entrypoint: ["/bin/sh", "/etc/prometheus/entrypoint.sh"]
    networks:
      - observatory-net-test
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    user: "472:0"
    build:
      context: .
      dockerfile: Dockerfile.grafana
    image: grafana/grafana:${STACK_TAG:-local}
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./data/grafana:/var/lib/grafana
    networks:
      - observatory-net-test
      - devsiam-mon
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    build:
      context: .
      dockerfile: Dockerfile.alertmanager
    image: prom/alertmanager:${STACK_TAG:-local}
    ports:
      - "127.0.0.1:${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./alertmanager:/etc/alertmanager
    entrypoint: ["/bin/sh", "/etc/alertmanager/entrypoint.sh"]
    networks:
      - observatory-net-test
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:9093/-/healthy",
        ]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  node-exporter:
    image: prom/node-exporter:v1.11.1
    ports:
      - "127.0.0.1:${NODE_EXPORTER_PORT:-9100}:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)(\
        $$|/)"
    networks:
      - observatory-net-test
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:9100/metrics",
        ]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  loki:
    image: grafana/loki:3.7.1
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./loki:/etc/loki
      - ./data/loki:/loki
    command: -config.file=/etc/loki/loki.yml
    networks:
      - observatory-net-test
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3100/ready",
        ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  process-exporter:
    image: ncabatoff/process-exporter:0.8.7
    ports:
      - "127.0.0.1:9256:9256"
    volumes:
      - /proc:/host/proc:ro
      - ./process-exporter:/config
    command:
      - "--procfs=/host/proc"
      - "--config.path=/config/config.yml"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    networks:
      - observatory-net-test
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/net/tcp6 | awk '{print $2}' | grep -q '00002394'"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
