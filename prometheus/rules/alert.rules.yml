groups:
  - name: node-alerts
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} down"
          description: >-
            {{ $labels.instance }} of job {{ $labels.job }} has been down
            for more than 1 minute.

      - alert: HighCpuUsage
        expr: >-
          100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
          > ${ALERT_CPU_THRESHOLD}
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: >-
            CPU usage is above ${ALERT_CPU_THRESHOLD}%
            (current value: {{ $value | printf "%.2f" }}%)

      - alert: HighMemoryUsage
        expr: >-
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
          / node_memory_MemTotal_bytes * 100 > ${ALERT_MEMORY_THRESHOLD}
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Memory usage on {{ $labels.instance }}"
          description: >-
            Memory usage is above ${ALERT_MEMORY_THRESHOLD}%
            (current value: {{ $value | printf "%.2f" }}%)

      - alert: HighDiskUsage
        expr: >-
          (node_filesystem_size_bytes - node_filesystem_free_bytes)
          / node_filesystem_size_bytes * 100 > ${ALERT_DISK_THRESHOLD}
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High Disk usage on {{ $labels.instance }}"
          description: >-
            Disk usage is above ${ALERT_DISK_THRESHOLD}% on {{ $labels.mountpoint }}
            (current value: {{ $value | printf "%.2f" }}%)

      - alert: DiskWillFillIn4Hours
        expr: >-
          predict_linear(node_filesystem_free_bytes{fstype!~"tmpfs|overlay"}[1h], 4*3600) < 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk will fill in 4 hours on {{ $labels.instance }}"
          description: >-
            Disk {{ $labels.mountpoint }} is predicted to fill up within 4 hours
            based on current growth rate.
