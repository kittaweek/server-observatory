groups:
  - name: node-recording
    rules:
      - record: node:cpu:usage:rate5m
        expr: >-
          100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)

      - record: node:memory:usage:percent
        expr: >-
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
          / node_memory_MemTotal_bytes * 100

      - record: node:disk:usage:percent
        expr: >-
          max by(instance) (
            (node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}
             - node_filesystem_free_bytes{fstype!~"tmpfs|overlay"})
            / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"} * 100
          )

      - record: node:network:receive:rate5m
        expr: rate(node_network_receive_bytes_total{device!~"lo"}[5m])

      - record: node:network:transmit:rate5m
        expr: rate(node_network_transmit_bytes_total{device!~"lo"}[5m])
